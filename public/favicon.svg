<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0f172a"/>
  <!-- Decorative Grid Lines -->
  <line x1="10" y1="30" x2="90" y2="30" stroke="#1e293b" stroke-width="1.5" />
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1e293b" stroke-width="1.5" />
  <line x1="10" y1="70" x2="90" y2="70" stroke="#1e293b" stroke-width="1.5" />
  <line x1="33" y1="10" x2="33" y2="90" stroke="#1e293b" stroke-width="1.5" />
  <line x1="66" y1="10" x2="66" y2="90" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Glowing main emblem -->
  <rect x="25" y="25" width="50" height="50" rx="12" fill="url(#grad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Letter text "SP" -->
  <text x="50" y="58" font-family="system-ui, sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="-1">SP</text>
  <!-- Sparkle/Dot -->
  <circle cx="72" cy="28" r="4" fill="#fbbf24" filter="url(#glow)"/>
</svg>
